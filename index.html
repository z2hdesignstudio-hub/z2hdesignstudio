<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z2H Design Studio | Transforming Imagination into Reality</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importing the Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>

    <main class="glass-container">
        <header>
            <img src="Logo 1_1.png" alt="Z2H Design Studio Logo" class="logo">
        </header>

        <section class="content">
            <!-- Updated Heading with <br> for forced 2-line layout -->
            <h1>GET READY TO TRANSFORM YOUR<br>IMAGINATION INTO A REALITY</h1>
            
            <p class="subtitle">Simulating &nbsp;•&nbsp; Prototyping &nbsp;•&nbsp; Fabricating</p>

            <div class="loading-wrapper">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="loading-text">
                    <span id="progressText">0</span>% Completed
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
